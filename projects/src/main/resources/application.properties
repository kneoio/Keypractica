quarkus.package.type=uber-jar

mp.jwt.verify.publickey.location=${JIRASCOPE_ISSUER_PUBLIC_KEY}
mp.jwt.verify.issuer=${JIRASCOPE_ISSUER}
smallrye.jwt.sign.key.location=${JIRASCOPE_ISSUER_PRIVATE_KEY}

quarkus.http.port=${REST_SERVER_PORT}
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,PUT,POST,DELETE
quarkus.http.cors.headers=Access-Control-Allow-Origin, Referrer-Policy

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${JIRASCOPE_DB_USER}
quarkus.datasource.password=${JIRASCOPE_DB_PASSWORD}
quarkus.datasource.reactive.url=postgresql://${JIRASCOPE_DB_HOST:localhost}:${JIRASCOPE_DB_HOST_PORT}/${JIRASCOPE_DB}

#quarkus.http.root-path=/api

quarkus.http.auth.proactive=true

quarkus.grpc.server.enable-reflection-service=true
quarkus.grpc.server.use-separate-server=false

quarkus.log.category.grpc.level=DEBUG
io.grpc.netty.Utils=SEVERE

quarkus.log.level=DEBUG
# quarkus.log.level=ERROR
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
quarkus.log.console.color=true
quarkus.log.console.level=DEBUG
quarkus.log.file.enable=true
quarkus.log.file.path=/tmp/trace.log
quarkus.log.console.json=false

mailer.api.key=${MAILER_API_KEY}
mailer.sender=${MAIL_SENDER}

telegram.token=${TELEGRAM_TOKEN}
telegram.chatId=${TELEGRAM_CHAT_ID}


quarkus.swagger-ui.always-include=false

quarkus.log.category."io.smallrye.mutiny".level=DEBUG

#http requests
quarkus.log.category."io.undertow".level=DEBUG
quarkus.log.category."javax.net.ssl".level=DEBUG

#jwt
quarkus.log.category."io.quarkus.smallrye.jwt".level=DEBUG
quarkus.log.category."io.undertow.access-log".level=DEBUG

quarkus.log.category."io.quarkus.smallrye.jwt.runtime.auth.MpJwtValidator".level=TRACE
quarkus.log.category."io.quarkus.smallrye.jwt.runtime.auth.MpJwtValidator".min-level=TRACE


